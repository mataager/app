<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management Center</title>
    <link rel="stylesheet" href="./output.css" />
    <link rel="icon" type="image/png" href="./assets/favico.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style src="./output.css"></style>
    <style src="/landing/output.css"></style>

    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-gray-50 font-sans antialiased">

    <div x-data="{ 
    tab: 'stores', 
    search: '',
    openModal: false,
    activeStore: null,
    stores: [],
    plans: [],
    promos: [],
    pageLoading: true, // New state for global loader
    
    isLoggedIn: localStorage.getItem('isAdmin') === 'true',
    accessToken: localStorage.getItem('adminToken'),
    isLoading: false,
    email: '',
    password: '',

    async init() {
        // Create a 5-second timer promise
        const timer = new Promise(resolve => setTimeout(resolve, 5000));

        // Create the data fetching promise
        const fetchData = (async () => {
            try {
                // Fetch Stores
                const storeRes = await fetch('https://matager-f1f00-default-rtdb.firebaseio.com/Stores.json');
                const storeData = await storeRes.json();
                this.stores = storeData ? Object.keys(storeData).map(key => ({ id: key, ...storeData[key] })) : [];

                // Fetch System
                const sysRes = await fetch('https://matager-f1f00-default-rtdb.firebaseio.com/system.json');
                const sysData = await sysRes.json();
                if (sysData) {
                    this.plans = sysData.plans ? Object.keys(sysData.plans).map(k => ({id: k, ...sysData.plans[k]})) : [];
                    this.promos = sysData.promo ? Object.keys(sysData.promo).map(k => ({id: k, ...sysData.promo[k]})) : [];
                }
            } catch (error) {
                console.error('Initial Load Error:', error);
            }
        })();

        // Wait for both the data and the 5-second timer to finish
        await Promise.all([fetchData, timer]);
        this.pageLoading = false;
    },
    
            async login() {
                if (this.email !== 'omaradmin@gmail.com') {
                    alert('Unauthorized email address.');
                    return;
                }
                this.isLoading = true;
                try {
                    const response = await fetch('https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key=AIzaSyDss53pHibCpqo87_1bhoUHkf8Idnj-Fig', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            email: this.email,
                            password: this.password,
                            returnSecureToken: true
                        })
                    });
    
                    const data = await response.json();
    
                    if (response.ok) {
                        this.accessToken = data.idToken;
                        this.isLoggedIn = true;
                        localStorage.setItem('isAdmin', 'true');
                        localStorage.setItem('adminToken', data.idToken);
                        this.tab = 'stores';
                        this.password = ''; 
                    } else {
                        alert('Login failed: ' + data.error.message);
                    }
                } catch (err) {
                    alert('An error occurred during login.');
                } finally {
                    this.isLoading = false;
                }
            },
    
            async deleteStore(id) {
                if (!confirm('Warning: This will delete the store data AND the user authentication account. Continue?')) return;
                
                this.isLoading = true;
                try {
                    // 1. Delete from Realtime Database
                    const dbResponse = await fetch(`https://matager-f1f00-default-rtdb.firebaseio.com/Stores/${id}.json?auth=${this.accessToken}`, {
                        method: 'DELETE'
                    });
    
                    if (!dbResponse.ok) throw new Error('Failed to delete store database record.');
    
                    // 2. Delete from Firebase Authentication (Using Identity Toolkit)
                    // Note: This requires the store ID to match the Firebase UID
                    const authResponse = await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:delete?key=AIzaSyDss53pHibCpqo87_1bhoUHkf8Idnj-Fig`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            idToken: this.accessToken, // Your admin token
                            localId: id // The UID of the user to delete
                        })
                    });
    
                    // If auth deletion fails, we still remove it from the UI list since DB is gone
                    this.stores = this.stores.filter(s => s.id !== id);
                    this.openModal = false;
                    this.activeStore = null;
                    
                    alert('Store and associated account deleted successfully.');
    
                } catch (error) {
                    console.error('Delete error:', error);
                    alert('Error: ' + error.message);
                } finally {
                    this.isLoading = false;
                }
            },
    
            logout() {
                this.isLoggedIn = false;
                this.accessToken = null;
                localStorage.removeItem('isAdmin');
                localStorage.removeItem('adminToken');
                this.tab = 'profile';
            },
    
            safeGet(obj, path, fallback = 'Lost') {
                const value = path.split('.').reduce((acc, part) => acc && acc[part], obj);
                return (value === undefined || value === null || value === '') ? fallback : value;
            },
    
            get filteredStores() {
                return this.stores.filter(s => {
                    const name = String(this.safeGet(s, 'store-info.mainInfo.store-name')).toLowerCase();
                    return name.includes(this.search.toLowerCase());
                });
            }
        }" class="min-h-screen">

        <div x-show="pageLoading" x-transition:leave="transition ease-in duration-500"
            x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
            class="fixed inset-0 z-[9999] flex flex-col items-center justify-center bg-white">

            <div class="relative flex items-center justify-center">
                <div class="w-20 h-20 border-4 border-blue-100 border-t-blue-600 rounded-full animate-spin"></div>
                <img src="YOUR_LOGO_URL" class="absolute w-10 h-10 animate-pulse" onerror="this.style.display='none'">
            </div>

            <div class="mt-6 text-center">
                <h2 class="text-xl font-bold text-gray-800 tracking-tight">Initializing System</h2>
                <p class="text-gray-400 text-sm mt-1">Fetching stores and security protocols...</p>
            </div>

            <div class="w-48 h-1 bg-gray-100 rounded-full mt-6 overflow-hidden">
                <div class="h-full bg-blue-600 animate-[loading_5s_ease-in-out]"></div>
            </div>
        </div>

        <header class="sticky top-0 z-30">
            <div class="max-w-7xl mx-auto px-4 flex items-center justify-center h-16">
                <nav class="flex space-x-1 bg-gray-100 p-1 rounded-xl">
                    <button @click="tab = 'stores'"
                        :class="tab === 'stores' ? 'bg-white shadow-sm text-blue-600' : 'text-gray-500'"
                        class="px-6 py-1.5 rounded-lg font-medium transition-all">Stores</button>
                    <button @click="tab = 'revenues'"
                        :class="tab === 'revenues' ? 'bg-white shadow-sm text-blue-600' : 'text-gray-500'"
                        class="px-6 py-1.5 rounded-lg font-medium transition-all">Revenues</button>
                    <button @click="tab = 'system'"
                        :class="tab === 'system' ? 'bg-white shadow-sm text-blue-600' : 'text-gray-500'"
                        class="px-6 py-1.5 rounded-lg font-medium transition-all">System</button>
                    <button @click="tab = 'profile'"
                        :class="tab === 'profile' ? 'bg-white shadow-sm text-blue-600' : 'text-gray-500'"
                        class="px-6 py-1.5 rounded-lg font-medium transition-all">Profile</button>
                </nav>
            </div>
        </header>

        <main class="max-w-7xl mx-auto p-6">

            <div x-show="tab === 'stores'" x-transition>
                <div class="flex justify-center mb-12">
                    <div class="relative w-full max-w-xl">
                        <input type="text" x-model="search" placeholder="Search stores by name..."
                            class="w-full px-6 py-4 rounded-xl border-none shadow-lg focus:ring-2 focus:ring-blue-500 outline-none text-lg searchBar">
                    </div>
                </div>

                <div class="flex overflow-x-auto space-x-6 pt-8 pb-8 hide-scrollbar snap-x snap-mandatory">
                    <template x-for="store in filteredStores" :key="store.id">
                        <div @click="activeStore = store; openModal = true"
                            class="flex-shrink-0 w-60 h-60 rounded-3xl relative overflow-hidden cursor-pointer transform hover:scale-105 transition-transform snap-center shadow-xl">

                            <img :src="safeGet(store, 'store-info.adminInfo.profilePic', 'https://via.placeholder.com/400')"
                                class="absolute inset-0 w-full h-full object-cover">

                            <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent">
                            </div>

                            <div class="absolute bottom-6 left-6 text-white w-full pr-12">
                                <h3 class="text-m font-bold leading-tight"
                                    x-text="safeGet(store, 'store-info.mainInfo.store-name')">
                                </h3>

                                <p class="text-[10px] font-mono opacity-60 mt-1 truncate" x-text="'ID: ' + store.id">
                                </p>

                                <p class="text-sm opacity-80 mt-1" x-text="safeGet(store, 'store-info.mainInfo.plan')">
                                </p>

                                <div
                                    class="mt-2 text-xs font-semibold px-2 py-1 bg-white/20 backdrop-blur-md rounded-md inline-block">
                                    View Details
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <div x-show="tab === 'revenues'" x-transition x-init="
                new Chart($refs.canvas, {
                    type: 'line',
                    data: {
                        labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                        datasets: [{ label: 'Platform Revenue', data: [12000, 19000, 15000, 25000, 22000, 30000], borderColor: '#2563eb', tension: 0.4 }]
                    }
                })
            ">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div class="bg-white p-6 rounded-xl shadow-sm border">
                        <p class="text-gray-500 text-sm">Total Sales</p>
                        <h2 class="text-xl font-bold">$142,500</h2>
                    </div>
                    <div class="bg-white p-6 rounded-xl shadow-sm border">
                        <p class="text-gray-500 text-sm">Active Subscriptions</p>
                        <h2 class="text-xl font-bold">1,240</h2>
                    </div>
                    <div class="bg-white p-6 rounded-xl shadow-sm border">
                        <p class="text-gray-500 text-sm">Growth</p>
                        <h2 class="text-xl font-bold text-green-500">+12.5%</h2>
                    </div>
                </div>
                <div class="bg-white p-8 rounded-xl shadow-sm border">
                    <canvas x-ref="canvas"></canvas>
                </div>
            </div>

            <div x-show="tab === 'system'" x-transition class="space-y-12">

                <section>
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-bold text-gray-800">Subscription Plans</h2>
                        <button
                            class="text-sm font-bold text-blue-600 bg-blue-50 px-4 py-2 rounded-xl hover:bg-blue-100 transition">+
                            Add Plan</button>
                    </div>

                    <template x-if="plans.length === 0">
                        <div class="bg-gray-50 border-2 border-dashed border-gray-200 rounded-3xl p-12 text-center">
                            <p class="text-gray-400">No plans found in the system yet.</p>
                        </div>
                    </template>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <template x-for="plan in plans" :key="plan.id">
                            <div class="bg-white p-6 rounded-3xl border shadow-sm relative group">
                                <h3 class="font-bold text-lg" x-text="plan.name"></h3>
                                <p class="text-2xl font-black text-blue-600 mt-2" x-text="'$' + plan.price"></p>
                                <p class="text-xs text-gray-500 mt-1"
                                    x-text="plan.description || 'Monthly subscription'"></p>
                                <button
                                    class="absolute top-4 right-4 opacity-0 group-hover:opacity-100 transition text-gray-400 hover:text-red-500">
                                    <i class="fa-solid fa-trash-can text-sm"></i>
                                </button>
                            </div>
                        </template>
                    </div>
                </section>

                <hr class="border-gray-100">

                <section>
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-bold text-gray-800">Active Promo Codes</h2>
                        <button
                            class="text-sm font-bold text-indigo-600 bg-indigo-50 px-4 py-2 rounded-xl hover:bg-indigo-100 transition">+
                            Create Promo</button>
                    </div>

                    <template x-if="promos.length === 0">
                        <div class="bg-gray-50 border-2 border-dashed border-gray-200 rounded-3xl p-12 text-center">
                            <p class="text-gray-400">No active promo codes available.</p>
                        </div>
                    </template>

                    <div class="bg-white rounded-3xl border overflow-hidden shadow-sm">
                        <table class="w-full text-left" x-show="promos.length > 0">
                            <thead class="bg-gray-50 border-b">
                                <tr>
                                    <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase">Code</th>
                                    <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase">Discount</th>
                                    <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase">Usage Limit</th>
                                    <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase">Expiry</th>
                                    <th class="px-6 py-4"></th>
                                </tr>
                            </thead>
                            <tbody class="divide-y">
                                <template x-for="promo in promos" :key="promo.id">
                                    <tr class="hover:bg-gray-50 transition">
                                        <td class="px-6 py-4"><span
                                                class="bg-indigo-100 text-indigo-700 font-mono font-bold px-2 py-1 rounded-md text-sm"
                                                x-text="promo.code"></span></td>
                                        <td class="px-6 py-4 font-bold" x-text="promo.discount + '%'"></td>
                                        <td class="px-6 py-4 text-sm text-gray-600"
                                            x-text="promo.used + ' / ' + promo.limit"></td>
                                        <td class="px-6 py-4 text-sm font-semibold"
                                            :class="new Date(promo.expiry) < new Date() ? 'text-red-500' : 'text-green-600'"
                                            x-text="promo.expiry"></td>
                                        <td class="px-6 py-4 text-right">
                                            <button class="text-gray-300 hover:text-red-500 transition"><i
                                                    class="fa-solid fa-trash-can"></i></button>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </section>
            </div>

            <div x-show="tab === 'profile'" x-transition class="max-w-md mx-auto p-4">
                <template x-if="!isLoggedIn">
                    <div class="bg-white rounded-3xl p-8 shadow-xl border">
                        <h2 class="text-2xl font-bold mb-6 text-gray-800">Admin Authentication</h2>
                        <div class="space-y-4">
                            <div>
                                <label class="text-xs font-bold text-gray-400 uppercase ml-1">Admin Email</label>
                                <input type="email" x-model="email" placeholder="omaradmin@gmail.com"
                                    class="w-full px-5 py-3 rounded-2xl border bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none transition">
                            </div>
                            <div>
                                <label class="text-xs font-bold text-gray-400 uppercase ml-1">Password</label>
                                <input type="password" x-model="password" placeholder="••••••••"
                                    class="w-full px-5 py-3 rounded-2xl border bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none transition">
                            </div>
                            <button @click="login()" :disabled="isLoading"
                                class="w-full py-4 bg-blue-600 text-white font-bold rounded-2xl hover:bg-blue-700 transition-all flex items-center justify-center disabled:opacity-50">
                                <span x-show="!isLoading">Sign In</span>
                                <span x-show="isLoading" class="animate-spin text-xl">
                                    <i class="fa-solid fa-circle-notch"></i>
                                </span>
                            </button>
                        </div>
                    </div>
                </template>

                <template x-if="isLoggedIn">
                    <div class="bg-white rounded-3xl shadow-sm border overflow-hidden">
                        <div class="h-32 bg-gradient-to-r from-blue-600 to-indigo-700"></div>
                        <div class="px-8 pb-8 text-center">
                            <div class="relative -mt-12 mb-4 flex justify-center">
                                <img src="https://ui-avatars.com/api/?name=Omar+Mohamed&background=0066FF&color=fff"
                                    class="w-24 h-24 rounded-2xl border-4 border-white shadow-md">
                            </div>
                            <h2 class="text-xl font-bold">Omar Mohamed</h2>
                            <p class="text-gray-500 text-sm">omarbussmo077@gmail.com</p>

                            <div class="mt-8 pt-6 border-t space-y-3">
                                <div class="flex justify-between text-sm">
                                    <span class="text-gray-400">Role</span>
                                    <span class="font-bold text-blue-600">Primary Admin</span>
                                </div>
                                <button @click="logout()"
                                    class="w-full mt-4 py-3 bg-red-50 text-red-600 font-bold rounded-xl hover:bg-red-100 transition">
                                    Sign Out
                                </button>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </main>

        <div x-show="openModal" class="modalPosition" x-transition.opacity>
            <div @click.away="openModal = false"
                class="bg-white w-full max-w-lg rounded-3xl overflow-hidden shadow-2xl">

                <template x-if="activeStore">
                    <div>
                        <div class="h-48 relative bg-gray-200">
                            <img :src="safeGet(activeStore, 'store-info.adminInfo.profilePic', 'https://via.placeholder.com/600x400')"
                                class="w-full h-full object-cover">
                            <button @click="openModal = false"
                                class="absolute top-4 right-4 bg-black/50 text-white w-10 h-10 flex items-center justify-center rounded-full hover:bg-black/70 transition">
                                <i class="fa-solid fa-xmark"></i>
                            </button>
                        </div>

                        <div class="p-8">
                            <div class="flex justify-between items-start mb-6">
                                <div>
                                    <h2 class="text-3xl font-bold text-gray-800"
                                        x-text="safeGet(activeStore, 'store-info.mainInfo.store-name')"></h2>
                                    <h2>id</h2>
                                    <p class="text-gray-500 flex items-center gap-1">
                                        <i class="fa-solid fa-location-dot text-xs"></i>
                                        <span
                                            x-text="`${safeGet(activeStore, 'store-info.locationInfo.district')} , ${safeGet(activeStore, 'store-info.locationInfo.city')}`"></span>
                                    </p>
                                </div>
                                <span class="px-3 py-1 rounded-full text-sm font-bold bg-green-100 text-green-700"
                                    x-text="safeGet(activeStore, 'store-info.mainInfo.plan')"></span>
                            </div>

                            <div class="grid grid-cols-2 gap-4 mb-8">
                                <div class="bg-blue-50 p-4 rounded-xl border border-blue-100">
                                    <p class="text-xs text-blue-400 uppercase font-bold">Admin</p>
                                    <p class="text-md font-bold text-blue-900"
                                        x-text="safeGet(activeStore, 'store-info.adminInfo.name')"></p>
                                    <p class="text-[10px] text-blue-400 truncate"
                                        x-text="safeGet(activeStore, 'store-info.adminInfo.Email')"></p>
                                </div>
                                <div class="bg-gray-50 p-4 rounded-xl border border-gray-100">
                                    <p class="text-xs text-gray-400 uppercase font-bold">Category</p>
                                    <p class="text-md font-bold text-gray-700 capitalize"
                                        x-text="safeGet(activeStore, 'store-info.mainInfo.businessCategory')"></p>
                                </div>
                            </div>

                            <div class="flex space-x-3">
                                <button @click="console.log('Edit store:', activeStore.id)"
                                    class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-200">
                                    <i class="fa-solid fa-pen-to-square mr-2"></i>Edit Store
                                </button>

                                <button @click="deleteStore(activeStore.id)"
                                    class="px-6 bg-red-100 text-red-600 py-3 rounded-xl font-bold hover:bg-red-200 transition">
                                    <i class="fa-solid fa-trash-can"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </div>

</body>

</html>
