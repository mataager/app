<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matager | Build Your Store</title>
    <link rel="icon" type="image/png" href="./assets/img/favico.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./assets/css/output.css" />
    <link rel="stylesheet" href="./assets/css/keyframes.css" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #050505;
            color: white;
            overflow: hidden;
        }

        /* Original Reveal Animations */
        @keyframes revealWord {
            0% {
                opacity: 0;
                transform: translateY(20px);
                filter: blur(5px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        @keyframes zoomIn {
            0% {
                opacity: 0;
                transform: scale(0.95);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .reveal {
            opacity: 0;
        }

        .animate-up {
            animation: revealWord 0.6s cubic-bezier(0.2, 1, 0.3, 1) forwards;
        }

        .animate-zoom {
            animation: zoomIn 0.6s cubic-bezier(0.2, 1, 0.3, 1) forwards;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Option Cards (Shopify Style) */
        .option-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .option-card:hover {
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.04);
        }

        .option-card.selected {
            border-color: #fff;
            background: rgba(255, 255, 255, 0.08);
        }

        /* Step Dot logic */
        .dot-glow {
            background: white !important;
            shadow: 0 0 12px #fff;
            opacity: 1 !important;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center justify-start p-4">
    <div class="fixed inset-0 -z-10">
        <div class="absolute rounded-full -top-20 -left-20 w-[500px] h-[500px] bg-[#0ea5e9] blur-[120px] opacity-10">
        </div>
        <div
            class="absolute rounded-full top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-[#2563eb] blur-[160px] opacity-10">
        </div>
        <div
            class="absolute rounded-full -bottom-20 -right-20 w-[500px] h-[500px] bg-[#4f46e5] blur-[120px] opacity-10">
        </div>
    </div>

    <!-- Team Member Access Glass Card -->
    <!-- Added max-h-[90vh] and flex-col to manage internal scrolling -->
    <div id="main-card"
        class="glass-card w-full max-w-[450px] rounded-[30px] max-h-[90vh] flex flex-col relative overflow-hidden"
        style="animation-delay: 200ms">

        <!-- FIXED HEADER: Store Identity -->
        <div class="px-8 pt-7 pb-4 z-10 border-b border-white/5">
            <div class="flex items-center gap-4 p-4 bg-white/[0.03] border border-white/5 rounded-2xl animate-up">
                <div class="w-12 h-12 rounded-xl bg-white/5 border border-white/10 overflow-hidden flex-shrink-0">
                    <img src="https://static.vecteezy.com/system/resources/previews/008/976/197/non_2x/fashion-store-logo-design-in-brown-color-on-white-background-illustration-vector.jpg"
                        class="w-full h-full object-cover opacity-80" alt="Store Logo">
                </div>
                <div class="flex flex-col">
                    <span class="text-[10px] font-black uppercase tracking-widest text-blue-400 opacity-80">Invited to
                        Join</span>
                    <h2 class="text-white font-bold text-sm truncate">Nike Official Store</h2>
                    <p class="text-[10px] text-white/30 font-mono">ID: STORE-99284-AX</p>
                </div>
            </div>
        </div>

        <!-- SCROLLABLE CONTENT AREA -->
        <!-- Added overflow-y-auto and custom scrollbar styling -->
        <div id="step-content"
            class="flex-1 overflow-y-auto px-8 py-4 reveal animate-up [animation-delay:400ms] scrollbar-thin scrollbar-thumb-white/10">

            <div class="space-y-6">
                <!-- Email Field -->
                <div class="space-y-2">
                    <label class="text-[10px] uppercase font-black tracking-widest opacity-30 ml-1 text-white">Email
                        Address</label>
                    <input type="email" id="teamEmail" placeholder="Enter your email"
                        class="w-full px-4 py-4 bg-white/[0.03] border border-white/10 rounded-xl text-white outline-none focus:border-white/40 transition-all">
                </div>

                <!-- Password Field -->
                <div class="space-y-2">
                    <label
                        class="text-[10px] uppercase font-black tracking-widest opacity-30 ml-1 text-white">Password</label>
                    <input type="password" id="teamPass" placeholder="••••••••"
                        class="w-full px-4 py-4 bg-white/[0.03] border border-white/10 rounded-xl text-white outline-none focus:border-white/40 transition-all">
                </div>

                <!-- Security Code Verification -->
                <div class="space-y-2">
                    <div class="flex justify-between items-center px-1">
                        <label class="text-[10px] uppercase font-black tracking-widest opacity-30 text-white">Security
                            Code</label>
                    </div>
                    <div class="relative">
                        <i class="bi bi-shield-lock absolute left-4 top-1/2 -translate-y-1/2 text-white/20"></i>
                        <input type="text" id="securityCode" placeholder="Enter 6-digit code" maxlength="6"
                            class="w-full px-4 py-4 pl-11 bg-white/[0.03] border border-white/10 rounded-xl text-white font-mono tracking-[0.5em] outline-none focus:border-blue-500/40 transition-all">
                    </div>
                </div>
            </div>
        </div>

        <!-- FIXED FOOTER: Action Bar -->
        <div id="action-bar" class="px-8 py-6  border-t border-white/5 flex items-center justify-between z-10">
            <button onclick="window.history.back()"
                class="flex items-center text-sm text-white/30 hover:text-white transition-colors">
                <i class="bi bi-arrow-left-short me-1"></i> Cancel
            </button>

            <button id="next-btn" onclick="verifyAccess()"
                class="flex items-center ml-auto bg-blue-600 text-white font-bold px-8 py-3 rounded-xl hover:bg-blue-500 shadow-lg shadow-blue-600/20 transition-all active:scale-95">
                Verify Access <i class="bi bi-shield-check ms-2"></i>
            </button>
        </div>
    </div>
</body>

</html>
