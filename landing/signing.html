        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #050505;

        /* Original Reveal Animations */
        @keyframes revealWord {
            0% {
                opacity: 0;
                transform: translateY(20px);
                filter: blur(5px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        @keyframes zoomIn {
            0% {
                opacity: 0;
                transform: scale(0.95);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .reveal {
            opacity: 0;
        }

        .animate-up {
            animation: revealWord 0.6s cubic-bezier(0.2, 1, 0.3, 1) forwards;
        }

        .animate-zoom {
            animation: zoomIn 0.6s cubic-bezier(0.2, 1, 0.3, 1) forwards;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Option Cards (Shopify Style) */
        .option-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .option-card:hover {
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.04);
        }

        .option-card.selected {
            border-color: #fff;
            background: rgba(255, 255, 255, 0.08);
        }

        /* Step Dot logic */
        .dot-glow {
            background: white !important;
            shadow: 0 0 12px #fff;
            opacity: 1 !important;
        }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // 1. Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDss53pHibCpqo87_1bhoUHkf8Idnj-Fig",
            authDomain: "matager-f1f00.firebaseapp.com",
            databaseURL: "https://matager-f1f00-default-rtdb.firebaseio.com",
            projectId: "matager-f1f00",
            storageBucket: "matager-f1f00.appspot.com",
            messagingSenderId: "922824110897",
            appId: "1:922824110897:web:b7978665d22e2d652e7610",
            measurementId: "G-FWS29Z8GMT",
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const BunnyConfig = {
            API_KEY: '34d2748e-3a4b-498e-8c43-f7ae4d1c14dbe74bcf63-e64e-4060-8b51-3441387c8d7e'
        };

        // 2. Internal Helper Functions
        async function optimizeImage(file, options = {}) {
            const { maxWidth = 800, maxHeight = 600, quality = 0.7, maxSizeKB = 200 } = options;
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        let width = img.width;
                        let height = img.height;
                        if (width > maxWidth || height > maxHeight) {
                            const ratio = Math.min(maxWidth / width, maxHeight / height);
                            width = Math.floor(width * ratio);
                            height = Math.floor(height * ratio);
                        }
                        const canvas = document.createElement("canvas");
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext("2d");
                        ctx.drawImage(img, 0, 0, width, height);
                        canvas.toBlob((blob) => {
                            if (!blob) return reject(new Error("Canvas failure"));
                            resolve(blob);
                        }, file.type || "image/jpeg", quality);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        async function uploadDataToCloud(file, config, storeTitle) {
            try {
                let fileToUpload = file;
                if (file.type.startsWith("image/")) {
                    fileToUpload = await optimizeImage(file);
                }
                const ext = file.name.split(".").pop();
                const filename = `logo_${storeTitle.replace(/\s+/g, '_')}_${Date.now()}.${ext}`;
                const uploadUrl = `https://storage.bunnycdn.com/${config.storageZoneName}/${filename}`;

                const res = await fetch(uploadUrl, {
                    method: "PUT",
                    headers: {
                        AccessKey: config.accessKey,
                        "Content-Type": "application/octet-stream"
                    },
                    body: fileToUpload
                });
                if (!res.ok) throw new Error("Upload failed");
                return `https://${config.pullZone}/${filename}`;
            } catch (err) {
                console.error("Logo Upload Error:", err);
                return "default-logo.png";
            }
        }

        const startRedirectCountdown = (seconds) => {
            const timerDisplay = document.getElementById("countdown-timer");
            let timeLeft = seconds;
            const countdown = setInterval(() => {
                if (timerDisplay) {
                    const mins = Math.floor(timeLeft / 60);
                    const secs = timeLeft % 60;
                    timerDisplay.textContent = `${mins}:${secs < 10 ? "0" : ""}${secs}`;
                }
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    window.location.href = "https://mataager.github.io/App/Client/Dashboard/index.html#dashboard";
                }
                timeLeft--;
            }, 1000);
        };

        // 3. Main Global Function
        window.settingEnvironment = async () => {
            const nextBtn = document.getElementById("next-btn");
            const overlay = document.getElementById("redirect-overlay");
            const card = document.getElementById("overlay-card");
            const statusHeading = overlay.querySelector("h2");
            const statusNote = overlay.querySelector("p");
            const redirectBtn = overlay.querySelector(".redirectNow");
            const footerItems = overlay.querySelector(".pt-6");

            const updateStepUI = async (title, note) => {
                statusHeading.className = "text-3xl font-bold text-white mb-2 step-exit";
                statusNote.className = "text-gray-400 text-lg mb-6 step-exit";
                await new Promise(r => setTimeout(r, 400));
                statusHeading.textContent = title;
                statusNote.textContent = note;
                statusHeading.className = "text-3xl font-bold text-white mb-2 step-enter";
                statusNote.className = "text-gray-400 text-lg mb-6 step-enter";
                statusHeading.offsetHeight;
                statusHeading.className = "text-3xl font-bold text-white mb-2 step-active";
                statusNote.className = "text-gray-400 text-lg mb-6 step-active";
            };

            overlay.classList.remove("hidden");
            setTimeout(() => {
                overlay.classList.add("opacity-100");
                card.classList.remove("scale-95");
                card.classList.add("scale-100");
            }, 50);

            try {
                // STEP 1: Collecting & Sanitizing
                await updateStepUI("Collecting Data", "Gathering your store preferences...");
                if (typeof formData === 'undefined') throw new Error("Form data missing");

                // BunnyCDN Storage Name Rules: 3-20 chars, lowercase, alphanumeric only
                const safeName = formData.storeName.toLowerCase().replace(/[^a-z0-9]/g, '').substring(0, 12);
                const bucketName = `${safeName}${Math.floor(1000 + Math.random() * 9000)}`;
                await new Promise(r => setTimeout(r, 1000));

                // STEP 2: Firebase Auth
                await updateStepUI("Setting Your Environment", "Creating your secure account...");
                const userCredential = await createUserWithEmailAndPassword(auth, formData.email, formData.password);
                const uid = userCredential.user.uid;
                await updateProfile(userCredential.user, { displayName: "client" });

                // STEP 3: BunnyCDN Provisioning
                await updateStepUI("Establish Your Cloud", "Provisioning storage and CDN...");
                const storageRes = await fetch('https://api.bunny.net/storagezone', {
                    method: 'POST',
                    headers: {
                        AccessKey: BunnyConfig.API_KEY,
                        'Content-Type': 'application/json',
                        'accept': 'application/json'
                    },
                    body: JSON.stringify({ Name: bucketName, Region: 'DE' })
                });

                if (!storageRes.ok) {
                    const errData = await storageRes.json();
                    throw new Error(`Storage Error: ${errData.Message || 'Check API Key'}`);
                }
                const storageData = await storageRes.json();

                const pullZoneRes = await fetch('https://api.bunny.net/pullzone', {
                    method: 'POST',
                    headers: { AccessKey: BunnyConfig.API_KEY, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ Name: bucketName, StorageZoneId: storageData.Id, Type: 0 })
                });
                const pullZoneData = await pullZoneRes.json();
                const fullPullZone = (pullZoneData.Name || bucketName) + '.b-cdn.net';

                // STEP 4: Branding Assets
                let finalLogoUrl = "default-logo.png";
                const logoInput = document.getElementById('storeLogoInput');
                const logoFile = logoInput?.files[0];

                if (logoFile) {
                    await updateStepUI("Branding Assets", "Optimizing and uploading your logo...");
                    finalLogoUrl = await uploadDataToCloud(logoFile, {
                        accessKey: storageData.Password,
                        storageZoneName: bucketName,
                        pullZone: fullPullZone
                    }, formData.storeName);
                }

                // STEP 5: Database Finalization
                await updateStepUI("Environment Ready!", "Finalizing your dashboard...");
                const createdAt = new Date().toISOString();
                const expDate = new Date();
                expDate.setDate(expDate.getDate() + 3);

                const finalSchema = {
                    "store-info": {
                        adminInfo: {
                            Email: formData.email,
                            Uid: uid,
                            name: `${formData.firstName} ${formData.lastName}`,
                            role: "client"
                        },
                        billingInfo: {
                            initial_plan: {
                                planAutoRenew: "Waiting",
                                planDiscount: "Waiting",
                                planExpDate: expDate.toISOString(),
                                planPaymentMethod: "Waiting",
                                planCapability: formData.inventory,
                                planPrice: "Waiting",
                                planStartedAt: createdAt,
                                planStatus: "Waiting",
                                planTotalPaid: "Waiting",
                                planfirsttime: "yes",
                            }
                        },
                        mainInfo: {
                            busFocus: {
                                busCategory: formData.focus,
                                busGen: "Waiting",
                                busDedicated: "Waiting",
                            },
                            CloudInfo: {
                                CloudId: storageData.Id || 0,
                                CloudName: bucketName,
                                cloudAccessKey: storageData.Password || "",
                                cloudPullZone: fullPullZone,
                                cloudRegion: 'DE'
                            }
                        },
                        structureInfo: {
                            storeLogo: finalLogoUrl,
                            brandingColor: formData.brandColor || "waiting",
                            Lightning: "on",
                            defDomain: `matager.com/dashboard/${uid}`,
                            endpoint: `/${uid}`,
                            busEmail: "Waiting",
                            busPhone: "Waiting",
                            plan: formData.inventory,
                            "store-name": formData.storeName,
                            governorate: "Waiting",
                            city: "Waiting",
                            district: "Waiting",
                            locationUrl: "waiting",
                            themeName: "waiting",
                            themeId: "waiting",
                        }
                    }
                };

                await set(ref(db, "Stores/" + uid), finalSchema);

                // Success UI
                redirectBtn.classList.add("show-final");
                footerItems.classList.add("show-final");
                startRedirectCountdown(5);

            } catch (error) {
                console.error("Setup Crash:", error);
                alert("Setup Failed: " + error.message);
                overlay.classList.add("hidden");
                if (nextBtn) nextBtn.disabled = false;
            }
        };
    </script>
</head>

                class="flex items-center text-sm text-white/30 hover:text-white transition-colors hidden">
                <i class="bi bi-arrow-left-short me-1"></i> Back
            </button>

            <button id="next-btn" onclick="nextStep()"
                class="flex items-center ml-auto bg-white text-black font-bold px-8 py-3 rounded-xl hover:bg-gray-100 transition-all active:scale-95">
                Continue <i class="bi bi-arrow-right-short text-xl ms-1"></i>
            </button>
        </div>

        <p id="toggle-area"
            class="border-t border-white/10 text-center pt-4 mt-4 text-sm text-white/30 reveal animate-up [animation-delay:500ms]">
            Already have an account?
            <button onclick="toggleSignIn()" class="text-white hover:text-blue-400 font-medium">Sign In</button>
        </p>
    </div>


    <script>
        let currentStep = 0;
        let isSignIn = false;
        let isResetting = false; // Track if we are in the "Forgot Password" view
        const formData = {};

        const steps = [
            {
                title: "Sales channels",
                sub: "What is your current strategy?",
                key: "channels",
                html: (data) => renderOptions([
                    { t: "Hybrid Unified Store", s: "POS synced with your website.", i: "bi-globe text-4xl mr-2,bi-pc-display text-4xl" },
                    { t: "Online Store", s: "Sell through a custom website.", i: "bi-globe text-4xl" },
                    { t: "POS Setup", s: "POS cashier system only.", i: "bi-pc-display text-4xl" }
                ], data.channels, true)
            },
            {
                title: "Create Account",
                sub: "Enter your email to get started.",
                fields: ['email'],
                html: (data) => `<div class="space-y-4 animate-up">
                <label class="text-[11px] uppercase tracking-widest text-white/30 ml-1">Email Address</label>
                <input type="email" id="email" value="${data.email || ''}" placeholder="name@gmail.com" class="w-full px-4 py-4 bg-white/[0.03] border border-white/10 rounded-xl text-white outline-none focus:border-white/40 transition-all ">
            </div>`
            },
            {
                title: "Complete Signup",
                sub: "Set your password and name.",
                fields: ['firstName', 'lastName', 'password'],
                html: (data) => `<div class="space-y-4 animate-up">
                <div class="flex gap-2">
                    <input type="text" id="firstName" value="${data.firstName || ''}" placeholder="First Name" class="w-1/2 px-4 py-4 bg-white/[0.03] border border-white/10 rounded-xl text-white outline-none ">
                    <input type="text" id="lastName" value="${data.lastName || ''}" placeholder="Last Name" class="w-1/2 px-4 py-4 bg-white/[0.03] border border-white/10 rounded-xl text-white outline-none ">
                </div>
                <div class="relative group">
                    <input type="password" id="password" value="${data.password || ''}" placeholder="Create a password" class="w-full px-4 py-4 bg-white/[0.03] border border-white/10 rounded-xl text-white outline-none focus:border-white/40 transition-all">
                    <button type="button" onclick="togglePassword()" class="absolute right-4 top-1/2 -translate-y-1/2 text-white/30 hover:text-white/60 focus:outline-none"><i id="toggleIcon" class="bi bi-eye"></i></button>
                </div>
            </div>`
            },
            {
                title: "What’s your focus?",
                sub: "Choose the categories you plan to sell.",
                key: "focus",
                html: (data) => renderOptions([
                    { t: "Apparel & Accessories", s: "Clothing, shoes, watches, and jewelry." },
                    { t: "Home & Garden", s: "Décor, kitchenware, and furniture." },
                    { t: "Beauty & Wellness", s: "Organic skincare and personal care." },
                    { t: "Electronics & Gadgets", s: "High-tech devices and gear." }
                ], data.focus)
            },
            {
                title: "Inventory Size",
                sub: "Choose the plan that fits your needs.",
                key: "inventory",
                html: (data) => renderOptions([
                    {
                        t: "1 - 5 item",
                        s: "Perfect for a boutique setup or single product launch.",
                        p: "50 EGP/mo",
                        id: "plan1" // Added ID
                    },
                    {
                        t: "5 - 20 item",
                        s: "Ideal for small collections and growing brands.",
                        p: "150 EGP/mo",
                        id: "plan2" // Added ID
                    },
                    {
                        t: "20 - 100 item",
                        s: "A comprehensive catalog for established shops.",
                        p: "250 EGP/mo",
                        id: "plan3" // Added ID
                    },
                    {
                        t: "100 - 300 item",
                        s: "High-volume inventory with multiple categories.",
                        p: "650 EGP/mo",
                        id: "plan4" // Added ID
                    },
                    {
                        t: "300 - 750 item",
                        s: "Large scale enterprise-level product management.",
                        p: "1200 EGP/mo",
                        id: "plan5" // Added ID
                    }
                ], data.inventory)
            },
            {
                title: "Store Name",
                sub: "What should we call your store?",
                fields: ['storeName'],
                html: (data) => `<div class="space-y-4 animate-up">
                <label class="text-[11px] uppercase tracking-widest text-white/30 ml-1">Store Name</label>
                <input type="text" id="storeName" value="${data.storeName || ''}" placeholder="My Awesome Store" class="w-full px-4 py-4 bg-white/[0.03] border border-white/10 rounded-xl text-white outline-none focus:border-white/40">
            </div>`
            },
            {
                title: "Store Identity",
                sub: "Upload your logo and pick your brand color.",
                fields: ['storeLogo', 'brandColor'],
                html: (data) => `
    <div class="space-y-8 animate-up">
        <div class="flex flex-col items-center justify-center">
            <div onclick="document.getElementById('storeLogoInput').click()" class="relative group cursor-pointer w-28 h-28 mb-3">
                <div id="preview-circle" class="w-full h-full rounded-full border-2 border-dashed border-white/20 bg-white/[0.03] flex items-center justify-center overflow-hidden transition-all group-hover:border-white/40">
                    ${data.storeLogo ? `<img src="${data.storeLogo}" class="w-full h-full object-cover">` : `<i class="bi bi-cloud-arrow-up text-2xl text-white/20"></i>`}
                </div>
                <div class="absolute bottom-0 right-0 bg-white text-black rounded-full p-1.5 shadow-lg">
                    <i class="bi bi-camera-fill text-base"></i>
                </div>
                <input type="file" id="storeLogoInput" accept="image/*" class="hidden" onchange="handleLogoUpload(event)">
            </div>
            <p class="text-[10px] uppercase tracking-[0.2em] text-white/30">Store Logo</p>
        </div>

        <div class="space-y-4">
            <label class="text-[11px] uppercase tracking-widest text-white/30 ml-1">Brand Accent Color</label>
            <div class="flex flex-wrap gap-3 justify-between items-center bg-white/[0.02] p-4 rounded-2xl border border-white/5">
                <div class="flex gap-2">
                    ${['#3b82f6', '#8b5cf6', '#ec4899', '#10b981', '#f59e0b'].map(color => `
                        <button onclick="selectColor('${color}')" 
                                class="w-8 h-8 rounded-full border-2 transition-transform hover:scale-110 ${data.brandColor === color ? 'border-white scale-110' : 'border-transparent'}" 
                                style="background-color: ${color}"></button>
                    `).join('')}
                </div>
                
                <div class="flex items-center gap-2 border-l border-white/10 pl-3">
                    <div id="color-indicator" class="w-4 h-4 rounded-full transition-colors duration-300" style="background-color: ${data.brandColor || '#3b82f6'}"></div>
                    <input type="text" id="brandColor" value="${data.brandColor || '#3b82f6'}" 
                           class="bg-transparent text-white text-xs font-mono outline-none w-20" 
                           oninput="updateColorIndicator(this.value)"
                           onfocus="this.select()">
                </div>
            </div>
        </div>
        <input type="hidden" id="storeLogo" value="${data.storeLogo || ''}">
    </div>`
            },
        ];

        function renderOptions(opts, current, hasIcons = false) {
            return `<div class="grid grid-cols-1 categories-options gap-3 animate-up">
    ${opts.map(o => {
                const isSelected = current === o.t;
                return `
        <div class="option-card group relative overflow-hidden p-4 rounded-xl flex justify-between items-center cursor-pointer transition-all duration-300 ${isSelected ? 'selected' : ''}" 
            onclick="setChoice(this, '${o.t}', '${o.p || ''}', '${o.id || ''}')" style="height: 85px;">
            
            <div class="flex flex-col z-10">
                <div class="flex items-center gap-2">
                    <span class="text-white font-medium capitalize">${o.t}</span>
                    ${o.p ? `<span class="text-[10px] px-2 py-0.5 bg-white/10 rounded-full border border-white/10">${o.p}</span>` : ''}
                </div>
                <small class="text-white/50">${o.s}</small>
            </div>

            ${hasIcons && o.i ? `
            <div class="submerged-icon absolute -bottom-6 left-4 opacity-20 pointer-events-none transition-all duration-500 ease-in-out group-hover:-translate-y-2 flex gap-2">
                ${o.i.split(',').map(icon => `<i class="bi ${icon} text-4xl text-white"></i>`).join('')}
            </div>` : ''}

            <div class="check-box z-10 w-5 h-5 border border-white/20 rounded flex items-center justify-center transition-all duration-300">
                <i class="bi bi-check-lg ${isSelected ? '' : 'scale-0'} transition-transform duration-200 text-black"></i>
            </div>
        </div>`;
            }).join('')}
</div>`;
        }

        //handle the display and pick the image and the unique color
        window.handleLogoUpload = (event) => {
            const file = event.target.files[0];
            const previewCircle = document.getElementById('preview-circle');
            const hiddenInput = document.getElementById('storeLogo');

            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const imageUrl = e.target.result;
                    // Update Preview & Data
                    if (previewCircle) previewCircle.innerHTML = `<img src="${imageUrl}" class="w-full h-full object-cover animate-fade-in">`;
                    if (hiddenInput) hiddenInput.value = imageUrl;
                    formData.storeLogo = imageUrl;
                };
                reader.readAsDataURL(file);
            }
        };

        window.selectColor = (color) => {
            const input = document.getElementById('brandColor');
            const indicator = document.getElementById('color-indicator');

            // Update Input, Indicator, and Global Data
            if (input) input.value = color.toUpperCase();
            if (indicator) indicator.style.backgroundColor = color;
            formData.brandColor = color;

            // Optional: If you want the "Finish Setup" button to change color too
            const finishBtn = document.getElementById('next-btn');
            if (finishBtn) finishBtn.style.backgroundColor = color;
        };

        window.updateColorIndicator = (value) => {
            const indicator = document.getElementById('color-indicator');
            const finishBtn = document.getElementById('next-btn');

            // Validate hex format (#FFF or #FFFFFF)
            if (/^#([0-9A-F]{3}){1,2}$/i.test(value)) {
                if (indicator) indicator.style.backgroundColor = value;
                if (finishBtn) finishBtn.style.backgroundColor = value;
                formData.brandColor = value;
            }
        };  // Also add a listener to trigger the hidden file input when the circle is clicked
        document.addEventListener('click', (e) => {
            if (e.target.closest('#logo-preview-container')) {
                document.getElementById('storeLogoInput').click();
            }
        });

        function saveCurrentData() {
            const step = steps[currentStep];
            if (step.fields) {
                step.fields.forEach(id => {
                    const el = document.getElementById(id);
                    if (el) formData[id] = el.value.trim();
                });
            }
        }

        function validateStep() {
            const step = steps[currentStep];
            let isValid = true;

            if (step.fields) {
                for (let id of step.fields) {
                    const el = document.getElementById(id);
                    const container = el.closest('div'); // Get the wrapper to append icons

                    // Check if field is empty
                    if (!el || !el.value.trim()) {
                        showError(el);
                        isValid = false;
                    } else {
                        clearError(el);
                    }
                }
            }

            if (step.key && !formData[step.key]) {
                // Handle selection-based steps (like radio buttons or cards)
                const selectionContainer = document.querySelector(`[data-key="${step.key}"]`) || document.getElementById(step.key);
                if (selectionContainer) {
                    selectionContainer.classList.add('border-red-500', 'ring-2', 'ring-red-200');
                    setTimeout(() => selectionContainer.classList.remove('ring-2'), 2000);
                }
                isValid = false;
            }

            return isValid;
        }

        function showError(el) {
            // 1. Add visual error state to the input
            el.classList.add('border-red-500', 'transition-all', 'duration-300');

            // 2. Fix positioning: Ensure the input's immediate parent is the anchor
            const parent = el.parentElement;
            parent.classList.add('relative');

            // 3. Remove existing icon to prevent the "double icon" look in your screenshots
            const existingIcon = parent.querySelector('.error-icon');
            if (existingIcon) existingIcon.remove();

            // 4. Create and inject the Bootstrap icon
            const icon = document.createElement('i');
            // Using 'translate-y-[-50%]' for pixel-perfect centering
            icon.className = 'bi bi-exclamation-circle-fill text-red-500 error-icon absolute right-3 top-1/2 -translate-y-1/2 animate-fade-in z-10';

            parent.appendChild(icon);

            // 5. Trigger the shake
            el.classList.add('animate-shake');
            setTimeout(() => el.classList.remove('animate-shake'), 500);

            // 6. Clear on type
            el.addEventListener('input', () => clearError(el), { once: true });
        }

        function clearError(el) {
            el.classList.remove('border-red-500');
            // Find the icon specifically within this input's parent
            const icon = el.parentElement.querySelector('.error-icon');
            if (icon) icon.remove();
        }

        function render() {
            const content = document.getElementById('step-content');
            const nextBtn = document.getElementById('next-btn');
            const data = steps[currentStep];

            content.innerHTML = `
                <h1 class="text-xl font-semibold tracking-tight mb-1 animate-up">${data.title}</h1>
                <p class="text-sm text-white/40 mb-8 animate-up">${data.sub}</p>
                ${data.html(formData)}
            `;

            // Ensure button has the correct onclick for Sign Up flow
            nextBtn.onclick = nextStep;
            nextBtn.innerHTML = (currentStep === steps.length - 1) ? 'Pay 1650 EGP GO <i class="bi bi-arrow-right-short ms-1"></i>' : 'Continue <i class="bi bi-arrow-right-short ms-1"></i>';

            updateIndicators();
        }

        function setChoice(el, value, price = '', planId = '') {
            const step = steps[currentStep];
            const key = step.key;

            // Save the primary selection (e.g., "1 - 5 item")
            formData[key] = value;

            // If it's the inventory step, capture the extra details
            if (key === 'inventory') {
                formData.planPrice = price;
                formData.planId = planId;
            }

            // UI Feedback (Keeping your existing logic)
            el.parentElement.querySelectorAll('.option-card').forEach(c => {
                c.classList.remove('selected');
                const check = c.querySelector('.bi-check-lg');
                if (check) check.classList.add('scale-0');
            });
            el.classList.add('selected');
            el.querySelector('.bi-check-lg').classList.remove('scale-0');
        }

        function updateIndicators() {
            const indicators = document.getElementById('step-indicators');
            const dots = indicators.querySelectorAll('.dot');
            const lines = indicators.querySelectorAll('.step-line');
            const backBtn = document.getElementById('back-btn');
            const toggle = document.getElementById('toggle-area');

            // Handle visibility of the whole bar
            indicators.style.display = (isSignIn || isResetting) ? 'none' : 'flex';
            backBtn.style.display = (currentStep === 0 || isSignIn || isResetting) ? 'none' : 'block';
            toggle.style.display = (currentStep === 0 || isSignIn || isResetting) ? 'block' : 'none';

            // Update Dots
            dots.forEach((dot, i) => {
                if (i === currentStep) {
                    // Active Step: Large and Glowing
                    dot.className = "dot w-1.5 h-1.5 rounded-full bg-white shadow-[0_0_12px_#fff] transition-all duration-300";
                } else if (i < currentStep) {
                    // Past Steps: Slightly visible
                    dot.className = "dot w-1.5 h-1.5 rounded-full bg-white/60 transition-all duration-300";
                } else {
                    // Future Steps: Dimmed
                    dot.className = "dot w-1.5 h-1.5 rounded-full bg-white/20 transition-all duration-300";
                }
            });

            // Update Lines
            lines.forEach((line, i) => {
                // If the step after this line is reached, highlight the line
                if (i < currentStep) {
                    line.style.backgroundColor = "rgba(255, 255, 255, 0.4)";
                } else {
                    line.style.backgroundColor = "rgba(255, 255, 255, 0.1)";
                }
            });
        }

        function nextStep() {
            saveCurrentData();
            if (!validateStep()) return;

            if (currentStep < steps.length - 1) {
                currentStep++;
                render();
            } else {
                settingEnvironment();
                formData.created_at = new Date().toISOString();

                console.log("Final Data Captured:", formData);
                // Final submission logic here
            }
        }

        function prevStep() {
            saveCurrentData();
            if (currentStep > 0) {
                currentStep--;
                render();
            }
        }

        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('toggleIcon');
            if (!input) return;
            const isPass = input.type === "password";
            input.type = isPass ? "text" : "password";
            icon.classList.replace(isPass ? 'bi-eye' : 'bi-eye-slash', isPass ? 'bi-eye-slash' : 'bi-eye');
        }

        function toggleSignIn() {
            isSignIn = !isSignIn;
            isResetting = false; // Reset the reset state if they toggle back
            const content = document.getElementById('step-content');
            const nextBtn = document.getElementById('next-btn');
            const toggleArea = document.getElementById('toggle-area');

            if (isSignIn) {
                content.innerHTML = `
                    <h1 class="text-xl font-semibold tracking-tight mb-1 animate-up">Welcome Back</h1>
                    <p class="text-sm text-white/40 mb-8 animate-up">Enter your credentials to access your store.</p>
                    <div class="space-y-4 animate-up">
                        <div class="space-y-2">
                            <input type="email" id="loginEmail" placeholder="Email Address" class="w-full px-4 py-4 bg-white/[0.03] border border-white/10 rounded-xl text-white outline-none focus:border-white/40">
                        </div>
                         <div class="space-y-2">
                             <input type="password" id="loginPass" placeholder="Password" class="w-full px-4 py-4 bg-white/[0.03] border border-white/10 rounded-xl text-white outline-none focus:border-white/40">
                        </div>
                        <div class="flex justify-end">
                            <button onclick="handleForgotPassword()" class="text-xs text-white/40 hover:text-white transition-colors">
                                Forgot Password?
                            </button>
                        </div>
                    </div>`;

                // Re-bind button for Login only
                nextBtn.innerHTML = 'Sign In <i class="bi bi-door-open ms-2"></i>';
                nextBtn.onclick = handleSignIn;

                toggleArea.innerHTML = `Don't have an account? <button onclick="toggleSignIn()" class="text-white hover:text-blue-400 font-medium">Sign Up</button>`;
            } else {
                currentStep = 0;
                toggleArea.innerHTML = `Already have an account? <button onclick="toggleSignIn()" class="text-white hover:text-blue-400 font-medium">Sign In</button>`;
                render();
            }
            updateIndicators();
        }

        function handleSignIn() {
            const emailEl = document.getElementById('loginEmail');
            const passEl = document.getElementById('loginPass');

            const email = emailEl.value.trim();
            const pass = passEl.value.trim();

            let isValid = true;

            // Validate Email
            if (!email) {
                showError(emailEl);
                isValid = false;
            } else {
                clearError(emailEl);
            }

            // Validate Password
            if (!pass) {
                showError(passEl);
                isValid = false;
            } else {
                clearError(passEl);
            }

            if (!isValid) return; // Stop here if validation failed

            console.log("Logging in with:", email, pass);
        }

        function handleForgotPassword() {
            isResetting = true;
            const content = document.getElementById('step-content');
            const nextBtn = document.getElementById('next-btn');
            const toggleArea = document.getElementById('toggle-area');

            content.innerHTML = `
                <div class="animate-up">
                    <h1 class="text-xl font-semibold tracking-tight mb-1">Reset Password</h1>
                    <p class="text-sm text-white/40 mb-8">Enter your email and we'll send you a retrieval link.</p>
                    <div class="space-y-4">
                        <label class="text-[11px] uppercase tracking-widest text-white/30 ml-1">Email Address</label>
                        <input type="email" id="resetEmail" placeholder="name@gmail.com" class="w-full px-4 py-4 bg-white/[0.03] border border-white/10 rounded-xl text-white outline-none focus:border-white/40 transition-all">
                    </div>
                    <div id="status-message" class="mt-4 text-sm hidden"></div>
                </div>`;

            nextBtn.innerHTML = `Send Retrieval Link <i class="bi bi-mailbox ms-2"></i>`;
            nextBtn.onclick = () => sendResetLink();

            toggleArea.innerHTML = `Remembered your password? <button onclick="toggleSignIn()" class="text-white hover:text-blue-400 font-medium">Sign In</button>`;
            updateIndicators();
        }

        function sendResetLink() {
            const emailInput = document.getElementById('resetEmail');
            const nextBtn = document.getElementById('next-btn');
            const statusMsg = document.getElementById('status-message');
            const email = emailInput.value.trim();

            // 1. Reset visual states
            clearError(emailInput);


            // 2. Validate using the new visual system
            if (!email || !email.includes('@')) {
                showError(emailInput);
                return;
            }

            // 3. Process the "Sending" state
            nextBtn.innerHTML = `<span class="animate-spin inline-block me-2">⚙️</span> Sending...`;
            nextBtn.disabled = true;

            // Simulate API call
            setTimeout(() => {
                const gmailUrl = "https://mail.google.com/mail/u/0/#search/from%3AMatager+reset";

                // Hide standard error text if it was visible
                statusMsg.classList.add('hidden');

                // Show the Premium Success Card
                statusMsg.innerHTML = `
            <div class="flex items-start gap-3 p-4 bg-emerald-500/10 border border-emerald-500/20 rounded-2xl animate-up">
                <i class="bi bi-check-circle-fill text-emerald-400 mt-1"></i>
                <div class="space-y-2">
                    <p class="text-emerald-400 font-bold text-sm">Reset Link Sent!</p>
                    <p class="text-white/60 text-xs leading-relaxed">Recovery link sent to <span class="text-white font-medium">${email}</span>.</p>
                    <a href="${gmailUrl}" target="_blank" class="inline-flex items-center gap-2 text-[11px] font-bold text-emerald-400 hover:text-emerald-300 uppercase tracking-wider transition-colors">
                        Open Gmail Inbox <i class="bi bi-box-arrow-up-right"></i>
                    </a>
                </div>
            </div>`;

                statusMsg.className = "mt-4 block"; // Ensure it's visible
                statusMsg.classList.remove('hidden');

                nextBtn.innerText = "Resend Link";
                nextBtn.disabled = false;
            }, 1200);
        }
