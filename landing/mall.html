<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matager Mall | Global Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top left, #1a1a2e, #0f0f1a, #000000);
            color: white;
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(59, 130, 246, 0.5);
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .glow-text {
            text-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
        }
    </style>
</head>

<body x-data="mallSystem()">

    <!-- Navigation -->
    <nav class="sticky top-0 z-50 px-6 py-4 glass-card border-t-0 border-x-0">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tighter glow-text">matager.mall</h1>
            <div class="flex gap-6 items-center">
                <div class="relative group">
                    <input type="text" placeholder="Search global marketplace..."
                        class="bg-white/5 border border-white/10 rounded-full px-6 py-2 w-64 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                </div>
                <button
                    class="bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded-full text-sm font-semibold transition-all">
                    Sell Your Items
                </button>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="max-w-7xl mx-auto px-6 py-16 text-center">
        <span class="text-blue-400 text-sm font-bold tracking-widest uppercase mb-4 block">Top Picked Globally</span>
        <h2 class="text-5xl md:text-7xl font-bold mb-6">Discover the Best of<br><span
                class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">All Connected
                Stores</span></h2>
        <p class="text-gray-400 max-w-2xl mx-auto text-lg">Every store operates independently, but only the
            top-performing items make it to the Mall.</p>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-6 pb-20">

        <!-- Bestseller Grid -->
        <div class="flex justify-between items-end mb-10">
            <h3 class="text-2xl font-semibold">Today's Best Sellers</h3>
            <div class="flex gap-2">
                <template x-for="filter in ['All', 'Clothing', 'Jewelry', 'Perfume']">
                    <button @click="activeFilter = filter"
                        :class="activeFilter === filter ? 'bg-white text-black' : 'text-gray-400 hover:text-white'"
                        class="px-4 py-1 rounded-full text-sm font-medium transition-all" x-text="filter"></button>
                </template>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
            <template x-for="item in filteredItems()" :key="item.id">
                <div class="glass-card rounded-3xl overflow-hidden group">
                    <!-- Image Container -->
                    <div class="relative h-64 overflow-hidden bg-white/5">
                        <img :src="item.image" :alt="item.name"
                            class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                        <div
                            class="absolute top-4 right-4 bg-black/60 backdrop-blur-md px-3 py-1 rounded-full text-xs font-bold text-blue-400 border border-blue-400/30">
                            HOT TREND
                        </div>
                    </div>

                    <!-- Content -->
                    <div class="p-6">
                        <div class="flex items-center gap-2 mb-2">
                            <div class="w-2 h-2 rounded-full bg-green-500"></div>
                            <span class="text-[10px] text-gray-400 uppercase tracking-widest font-bold"
                                x-text="item.store"></span>
                        </div>
                        <h4 class="text-lg font-bold mb-1" x-text="item.name"></h4>
                        <div class="flex justify-between items-center mt-4">
                            <span class="text-xl font-bold text-white" x-text="'$' + item.price"></span>
                            <button class="p-2 rounded-xl bg-white/10 hover:bg-white/20 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                                    stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M12 4v16m8-8H4" />
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <!-- UI Logic -->
    <script>
        function mallSystem() {
            return {
                activeFilter: 'All',
                items: [
                    { id: 1, name: 'Royal Oud Essence', price: '120', category: 'Perfume', store: 'Cairo Fragrance', image: 'https://images.unsplash.com/photo-1594035910387-fea47794261f?auto=format&fit=crop&q=80&w=400' },
                    { id: 2, name: 'Diamond Edge Ring', price: '850', category: 'Jewelry', store: 'Elite Gems', image: 'https://images.unsplash.com/photo-1605100804763-247f67b3557e?auto=format&fit=crop&q=80&w=400' },
                    { id: 3, name: 'Minimalist Tech Tee', price: '45', category: 'Clothing', store: 'Urban Gear', image: 'https://images.unsplash.com/photo-1521572267360-ee0c2909d518?auto=format&fit=crop&q=80&w=400' },
                    { id: 4, name: 'Velvet Evening Gown', price: '290', category: 'Clothing', store: 'Zaga Styles', image: 'https://images.unsplash.com/photo-1566174053879-31528523f8ae?auto=format&fit=crop&q=80&w=400' },
                ],
                filteredItems() {
                    if (this.activeFilter === 'All') return this.items;
                    return this.items.filter(i => i.category === this.activeFilter);
                }
            }
        }
    </script>
</body>

</html>
